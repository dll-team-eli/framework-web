<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Eli — Safety Framework</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #d8e0ec;
    font-family: system-ui, 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 24px 16px;
  }

  #app {
    width: 100%;
    max-width: 1100px;
    background: #fff;
    border: 1px solid #b0bcd0;
    border-radius: 14px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    min-height: 750px;
  }

  /* ─── TOPBAR ─── */
  #topbar {
    background: #fff;
    border-bottom: 1px solid #b0bcd0;
    padding: 10px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .topbar-left { display: flex; align-items: center; gap: 10px; }
  .house-icon {
    width: 32px; height: 32px;
    background: #dbeaf8;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .house-icon svg { width: 18px; height: 18px; }
  .topbar-titles { display: flex; flex-direction: column; gap: 1px; }
  .topbar-title { font-size: 13px; font-weight: 500; color: #0c1a28; }
  .topbar-sub { font-size: 11px; color: #5a6f88; }
  .status-pill {
    font-size: 11px; font-weight: 500;
    background: #cce8d8; color: #155230; border: 1px solid #88c8a4;
    border-radius: 20px; padding: 4px 10px;
  }

  /* ─── KEY BAR ─── */
  #keybar {
    background: #eaeff7;
    border-bottom: 1px solid #b0bcd0;
    padding: 7px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 6px;
    flex-shrink: 0;
  }
  .keybar-left { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .key-label {
    font-size: 10px; font-weight: 600; letter-spacing: 0.08em;
    text-transform: uppercase; color: #5a6f88;
  }
  .legend-items { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 5px; }
  .legend-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .legend-label { font-size: 10px; color: #38526a; }
  .keybar-right { display: flex; align-items: center; gap: 6px; }
  .cat-tag {
    font-size: 10px; border-radius: 4px; padding: 2px 7px; font-weight: 500;
  }
  .cat-danger { background: #ecc0d0; color: #580e28; }
  .cat-challenge { background: #b8d0ec; color: #063860; }
  .cat-frustration { background: #eccca0; color: #502800; }

  /* ─── FLOOR TOGGLE BAR ─── */
  #floortoggle {
    background: #fff;
    border-bottom: 1px solid #b0bcd0;
    padding: 0 18px;
    display: flex;
    align-items: stretch;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .floor-tabs { display: flex; align-items: stretch; gap: 0; }
  .floor-tab {
    font-size: 12px; font-weight: 500;
    color: #5a6f88;
    padding: 10px 16px;
    border: none; background: none; cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: color 0.15s, border-color 0.15s;
    white-space: nowrap;
  }
  .floor-tab.active { color: #2070b8; border-bottom-color: #2070b8; }
  .floor-tab:hover:not(.active) { color: #2070b8; }
  .floor-hint { font-size: 10px; color: #8090a4; align-self: center; }

  /* ─── FLOOR MAP ─── */
  #mapwrap {
    padding: 10px 12px 12px;
    flex-shrink: 0;
  }
  #floormap {
    position: relative;
    width: 100%;
    aspect-ratio: 100 / 62;
    border-radius: 10px;
    border: 1px solid #9aaabf;
    overflow: hidden;
    background: #c2cedf;
  }
  #floormap-img {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    border-radius: 10px;
    z-index: 0;
  }
  .floor-hint-below {
    text-align: center;
    font-size: 11px;
    color: #5a6f88;
    margin-top: 8px;
  }

  /* ─── ROOM ZONES ─── */
  .room-zone {
    position: absolute;
    border-radius: 6px;
    border: 2px solid rgba(255,255,255,0.45);
    background: rgba(255,255,255,0.06);
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    z-index: 1;
  }
  .room-zone:hover {
    border-color: #2070b8;
    background: rgba(255,255,255,0.22);
  }
  .zone-label {
    position: absolute;
    bottom: 6px; left: 6px;
    font-size: 9px; font-weight: 500;
    background: rgba(0,0,0,0.45);
    color: #fff;
    border-radius: 4px;
    padding: 2px 6px;
    pointer-events: none;
    white-space: nowrap;
  }
  .zone-badge {
    position: absolute;
    top: 6px; right: 6px;
    width: 17px; height: 17px;
    border-radius: 50%;
    border: 2px solid #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 700; color: #fff;
    pointer-events: none;
  }

  /* ─── STATE 2: ROOM VIEW ─── */
  #roomview {
    display: none;
    flex: 1;
    min-height: 0;
  }
  #roomview.active {
    display: flex;
    flex-direction: row;
    align-items: stretch;
    height: calc(100vh - 90px);
    overflow: hidden;
  }

  /* ─── ROOM LEFT COLUMN ─── */
  #room-left {
    flex: 1;
    flex-shrink: 0;
    min-width: 0;
    position: relative;
    display: flex;
    flex-direction: column;
    height: calc(100vh - 90px);
    overflow: hidden;
  }

  /* ─── ROOM TOPBAR ─── */
  #room-topbar {
    background: #fff;
    border-bottom: 1px solid #b0bcd0;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  #back-btn {
    display: flex; align-items: center; gap: 5px;
    background: #e8f1fb; border: 1px solid #a8ccf0;
    border-radius: 6px; padding: 5px 10px;
    font-size: 11px; font-weight: 500; color: #2070b8;
    cursor: pointer; white-space: nowrap;
  }
  #back-btn:hover { background: #d0e4f8; }
  #room-name-label { font-size: 13px; font-weight: 500; color: #0c1a28; }
  .floor-tag {
    font-size: 10px; background: #cce0f5; color: #08406c;
    border-radius: 4px; padding: 2px 7px; font-weight: 500;
  }

  /* ─── PHOTO CAROUSEL ─── */
  #carousel-wrap {
    flex: 1;
    position: relative;
    min-height: 0;
    overflow: hidden;
    background: #1a2535;
  }
  #carousel {
    position: absolute;
    inset: 0;
    background: #1a2535;
  }
  #carousel-img {
    position: absolute;
    top: 16px; left: 16px; right: 16px; bottom: 16px;
    width: calc(100% - 32px);
    max-height: calc(100% - 32px);
    object-fit: contain;
    border-radius: 10px;
    display: none;
    z-index: 5;
  }
  #carousel-img.visible { display: block; }
  .carousel-placeholder {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 8px;
    z-index: 1;
  }
  .carousel-placeholder-label {
    font-size: 13px; font-weight: 500;
    color: rgba(255,255,255,0.45);
    letter-spacing: 0.03em;
    text-align: center;
  }
  .carousel-arrow {
    -webkit-appearance: none;
    appearance: none;
    position: absolute;
    top: 50%; transform: translateY(-50%);
    width: 40px; height: 40px; border-radius: 50%;
    background: rgba(0,0,0,0.45);
    border: 1px solid rgba(255,255,255,0.3);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    z-index: 30;
    padding: 0;
    transition: background 0.15s;
  }
  .carousel-arrow:hover { background: rgba(0,0,0,0.65); }
  .carousel-arrow.hidden { display: none !important; }
  #arrow-prev { left: 12px; }
  #arrow-next { right: 12px; }
  .carousel-counter {
    position: absolute; top: 10px; right: 10px;
    font-size: 10px; color: rgba(255,255,255,0.6);
    background: rgba(0,0,0,0.4); border-radius: 10px; padding: 3px 8px;
    z-index: 10;
  }
  .carousel-dots {
    position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 6px; z-index: 10;
  }
  .carousel-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: rgba(255,255,255,0.3); cursor: pointer;
    transition: background 0.15s;
  }
  .carousel-dot.active { background: rgba(255,255,255,0.85); }

  /* ─── DETAIL PANEL ─── */
  #detail-panel {
    width: 290px;
    flex-shrink: 0;
    background: #fff;
    border-left: 1px solid #b0bcd0;
    display: flex;
    flex-direction: column;
    height: calc(100vh - 90px);
    overflow: hidden;
  }
  #panel-header {
    padding: 14px 15px;
    border-bottom: 1px solid #c8d0e0;
    flex-shrink: 0;
  }
  #panel-room-name { font-size: 15px; font-weight: 500; color: #0c1a28; margin-bottom: 3px; }
  #panel-risk-meta { font-size: 11px; color: #5a6f88; }
  #panel-hazards {
    flex: 1;
    overflow-y: auto;
    padding: 12px 12px 16px;
  }
  .hazard-section-label {
    display: inline-block;
    font-size: 10px; font-weight: 600;
    letter-spacing: 0.07em; text-transform: uppercase;
    border-radius: 4px; padding: 2px 7px;
    margin-bottom: 6px; margin-top: 10px;
  }
  .hazard-section-label:first-child { margin-top: 0; }
  .hazard-card {
    background: #e8edf5;
    border: 0.5px solid #b0bcd0;
    border-radius: 7px;
    padding: 9px 11px;
    margin-bottom: 5px;
  }
  .hazard-title { font-size: 13px; font-weight: 500; color: #0c1a28; margin-bottom: 4px; }
  .hazard-desc { font-size: 12px; color: #385070; line-height: 1.5; margin-bottom: 7px; }
  .hazard-solution {
    background: #c8e4d0;
    border-left: 3px solid #145838;
    border-radius: 0 5px 5px 0;
    padding: 7px 9px;
    font-size: 11px; color: #082818; line-height: 1.5;
  }
  .hazard-price {
    font-size: 11px; color: #8090a4; margin-top: 6px; line-height: 1.4;
  }
  .hazard-links { margin-top: 6px; display: flex; flex-direction: column; gap: 4px; }
  .hazard-link {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 11px; color: #2070b8; text-decoration: none;
  }
  .hazard-link:hover { text-decoration: underline; }

  /* ─── PHOTO ICON LAYER ─── */
  #photo-icon-layer {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 6;
  }
  .hazard-icon {
    position: absolute;
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 2px solid #fff;
    box-shadow: 0 2px 6px rgba(0,0,0,0.35);
    display: flex; align-items: center; justify-content: center;
    transform: translate(-50%, -50%);
    pointer-events: all;
    cursor: pointer;
    padding: 0;
    transition: transform 0.12s, box-shadow 0.12s;
  }
  .hazard-icon:hover {
    transform: translate(-50%, -50%) scale(1.18);
    box-shadow: 0 3px 10px rgba(0,0,0,0.45);
  }
  .hazard-icon.active {
    transform: translate(-50%, -50%) scale(1.2) !important;
    box-shadow: 0 0 0 3px rgba(255,255,255,0.8) !important;
    border-width: 3px !important;
    z-index: 10;
  }

  /* ─── ACCORDION ─── */
  .accordion-card {
    border: 1px solid #d0d8e8;
    border-radius: 7px;
    margin-bottom: 5px;
    overflow: hidden;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  /* Category-specific focus states */
  .accordion-card[data-cat="danger"].focused {
    border-color: #e87098;
    box-shadow: 0 0 0 2px rgba(232,112,152,0.15);
  }
  .accordion-card[data-cat="danger"].focused .accordion-header {
    background: #fbeaf0;
  }
  .accordion-card[data-cat="challenge"].focused {
    border-color: #5888c0;
    box-shadow: 0 0 0 2px rgba(88,136,192,0.15);
  }
  .accordion-card[data-cat="challenge"].focused .accordion-header {
    background: #e8f1fb;
  }
  .accordion-card[data-cat="frustration"].focused {
    border-color: #d89830;
    box-shadow: 0 0 0 2px rgba(216,152,48,0.15);
  }
  .accordion-card[data-cat="frustration"].focused .accordion-header {
    background: #faeeda;
  }
  .accordion-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 9px 11px;
    cursor: pointer;
    background: #f8fafc;
    user-select: none;
    -webkit-user-select: none;
    transition: background 0.12s;
  }
  .accordion-header:hover { background: #eaeef6; }
  .accordion-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .accordion-title {
    font-size: 11px; font-weight: 500;
    color: #0c1a28; flex: 1;
    line-height: 1.35;
  }
  .accordion-chevron {
    width: 14px; height: 14px;
    flex-shrink: 0;
    transition: transform 0.2s;
    color: #8090a4;
  }
  .accordion-card.open .accordion-chevron { transform: rotate(180deg); }
  .accordion-body {
    display: none;
    padding: 0 11px 10px;
    background: #fff;
  }
  .accordion-card.open .accordion-body { display: block; }
  .accordion-desc {
    font-size: 11px; color: #5a6f88;
    line-height: 1.5;
    padding-top: 8px;
    margin-bottom: 7px;
  }
  .accordion-solution {
    background: #cce4d4;
    border-left: 3px solid #145838;
    border-radius: 0 5px 5px 0;
    padding: 7px 9px;
    font-size: 11px; color: #082818; line-height: 1.5;
  }
  .accordion-price {
    font-size: 11px; color: #8090a4;
    margin-top: 6px; line-height: 1.4;
  }
  .accordion-links { margin-top: 6px; display: flex; flex-direction: column; gap: 4px; }
  .accordion-link {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 11px; color: #2070b8; text-decoration: none;
  }
  .accordion-link:hover { text-decoration: underline; }

  /* ─── PANEL LEGEND ─── */
  #panel-legend {
    padding: 10px 15px;
    border-top: 1px solid #c8d0e0;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-shrink: 0;
    background: #f8f9fc;
  }
  .panel-legend-item { display: flex; align-items: center; gap: 5px; }
  .panel-legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .panel-legend-label { font-size: 10px; color: #5a6f88; }

  /* ─── OVERVIEW STATE ─── */
  #overview { display: flex; flex-direction: column; flex: 1; }
  #overview.hidden { display: none; }
</style>
</head>
<body>
<div id="app">

  <!-- TOPBAR -->
  <div id="topbar">
    <div class="topbar-left">
      <div class="house-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#2070b8" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9.5L12 3l9 6.5V21H3V9.5z"/>
          <rect x="9" y="14" width="6" height="7" rx="1"/>
        </svg>
      </div>
      <div class="topbar-titles">
        <div class="topbar-title">Project Eli — Safety Framework</div>
        <div class="topbar-sub">Independent Living Unit B</div>
      </div>
    </div>
    <div class="status-pill">All systems reviewed</div>
  </div>

  <!-- KEY BAR -->
  <div id="keybar">
    <div class="keybar-left">
      <span class="key-label">Key</span>
      <div class="legend-items">
        <div class="legend-item">
          <div class="legend-dot" style="background:#e87098"></div>
          <span class="legend-label">Danger</span>
        </div>
        <div class="legend-item">
          <div class="legend-dot" style="background:#5888c0"></div>
          <span class="legend-label">Challenge</span>
        </div>
        <div class="legend-item">
          <div class="legend-dot" style="background:#d89830"></div>
          <span class="legend-label">Frustration</span>
        </div>
      </div>
    </div>
  </div>

  <!-- FLOOR TOGGLE BAR -->
  <div id="floortoggle">
    <div class="floor-tabs">
      <button class="floor-tab active" data-floor="1">Floor 1</button>
      <button class="floor-tab" data-floor="2">Floor 2</button>
    </div>
    <span class="floor-hint" id="floor-hint-text">Downstairs — entrance, living room, kitchen, dining / laundry / pantry, patio</span>
  </div>

  <!-- OVERVIEW STATE -->
  <div id="overview">
    <div id="mapwrap">
      <div id="floormap">
        <img id="floormap-img" src="Team_Eli.jpg" alt="" onerror="this.style.display='none'">
        <!-- Zones injected by JS -->
      </div>
    </div>
    <div class="floor-hint-below">Click any room to view photos, hazards, and solutions.</div>
  </div>

  <!-- ROOM VIEW STATE -->
  <div id="roomview">
    <div id="room-left">
      <div id="room-topbar">
        <button id="back-btn">
          <svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="6,2 3,5 6,8"/>
          </svg>
          Back to floor plan
        </button>
        <span id="room-name-label"></span>
        <span class="floor-tag" id="room-floor-tag"></span>
      </div>
      <div id="carousel-wrap">
        <div id="carousel">
          <img id="carousel-img" alt="">
          <div id="photo-icon-layer"></div>
          <div class="carousel-placeholder" id="carousel-placeholder">
            <span class="carousel-placeholder-label" id="carousel-label">Photo 1 of 1</span>
          </div>
          <div class="carousel-counter" id="carousel-counter">1 / 1</div>
          <div class="carousel-dots" id="carousel-dots"></div>
        </div>
        <button class="carousel-arrow" id="arrow-prev">
          <svg width="10" height="16" viewBox="0 0 10 16" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="8,2 2,8 8,14"/></svg>
        </button>
        <button class="carousel-arrow" id="arrow-next">
          <svg width="10" height="16" viewBox="0 0 10 16" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="2,2 8,8 2,14"/></svg>
        </button>
      </div>
    </div>
    <div id="detail-panel">
      <div id="panel-header">
        <div id="panel-room-name"></div>
        <div id="panel-risk-meta"></div>
      </div>
      <div id="panel-hazards"></div>
      <div id="panel-legend">
        <div class="panel-legend-item">
          <div class="panel-legend-dot" style="background:#e87098"></div>
          <span class="panel-legend-label">Danger</span>
        </div>
        <div class="panel-legend-item">
          <div class="panel-legend-dot" style="background:#5888c0"></div>
          <span class="panel-legend-label">Challenge</span>
        </div>
        <div class="panel-legend-item">
          <div class="panel-legend-dot" style="background:#d89830"></div>
          <span class="panel-legend-label">Frustration</span>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
// ─── DATA ───────────────────────────────────────────────────────────────────

const FLOORS = {
  1: {
    image: 'Team_Eli.jpg',
    hint: 'Downstairs — entrance, living room, kitchen, dining / laundry / pantry, patio',
    zones: [
      {
        id: 'living-room', name: 'Living Room', floor: 1,
        style: { left:'3%', top:'3%', width:'49%', height:'87%' },
        badge: { color:'#cc8c28', count:3 }, zIndex: 1,
        photos: ['living_room_1.jpg','living_room_2.jpg','living_room_3.jpg']
      },
      {
        id: 'entrance', name: 'Entrance', floor: 1,
        style: { left:'3%', top:'3%', width:'14%', height:'16%' },
        badge: { color:'#c06888', count:3 }, zIndex: 3,
        photos: ['entrance_1.jpg','entrance_2.jpg']
      },
      {
        id: 'patio', name: 'Patio', floor: 1,
        style: { left:'3%', top:'78%', width:'16%', height:'12%' },
        badge: { color:'#cc8c28', count:3 }, zIndex: 3,
        photos: ['patio_1.jpg','patio_2.jpg']
      },
      {
        id: 'dining', name: 'Dining / Laundry / Pantry', floor: 1,
        style: { left:'59%', top:'3%', width:'32%', height:'39%' },
        badge: { color:'#5888c0', count:2 }, zIndex: 2,
        photos: ['dining_1.jpg','dining_2.jpg','dining_3.jpg']
      },
      {
        id: 'kitchen', name: 'Kitchen', floor: 1,
        style: { left:'59%', top:'48%', width:'32%', height:'42%' },
        badge: { color:'#d85858', count:5 }, zIndex: 2,
        photos: ['kitchen_1.jpg','kitchen_2.jpg','kitchen_3.jpg']
      }
    ]
  },
  2: {
    image: 'upstairs.jpg',
    hint: 'Upstairs — Eli\'s bedroom, bedroom 2, bathroom, stairs',
    zones: [
      {
        id: 'bedroom2', name: 'Bedroom 2', floor: 2,

  flame:    `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2s-4 5.5-4 9.5a4 4 0 008 0C16 7.5 12 2 12 2z"/><path d="M10 14.5c.5-1.5 2-2 2-2s1.5.5 2 2"/></svg>`,
  water:    `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2C12 2 5 11 5 15a7 7 0 0014 0C19 11 12 2 12 2z"/></svg>`,
  lock:     `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 018 0v4"/></svg>`,
  lines:    `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"><line x1="3" y1="7" x2="21" y2="7"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="17" x2="15" y2="17"/></svg>`,
  pill:     `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 3L3 9a5 5 0 007.1 7.1L16 10A5 5 0 009 3z"/><line x1="7.5" y1="10.5" x2="13" y2="5.5"/></svg>`,
  lightbulb:`<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18h6M10 21h4M12 2a7 7 0 017 7 7 7 0 01-4 6.3V17H9v-1.7A7 7 0 015 9a7 7 0 017-7z"/></svg>`,
  person:   `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="7" r="4"/><path d="M4 21v-1a8 8 0 0116 0v1"/></svg>`,
  warning:  `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.3 3.6L2.5 18a1.5 1.5 0 001.3 2.2h16.4a1.5 1.5 0 001.3-2.2L13.7 3.6a1.6 1.6 0 00-3.4 0z"/><line x1="12" y1="9" x2="12" y2="13"/><circle cx="12" cy="17" r="1" fill="#fff" stroke="none"/></svg>`
};

// ─── HAZARD ICON POSITIONS ───────────────────────────────────────────────────

const HAZARD_META = {
  // Kitchen
  'kitchen_0_0': { icon: 'flame',    top: '45%', left: '35%' },
  'kitchen_0_1': { icon: 'warning',  top: '30%', left: '62%' },
  'kitchen_0_2': { icon: 'water',    top: '60%', left: '18%' },
  'kitchen_1_0': { icon: 'lines',    top: '70%', left: '58%' },
  'kitchen_2_0': { icon: 'lock',     top: '18%', left: '70%' },
  'kitchen_2_1': { icon: 'warning',  top: '75%', left: '40%' },
  // Living Room
  'living-room_0_0': { icon: 'warning',    top: '25%', left: '40%' },
  'living-room_0_1': { icon: 'warning',    top: '25%', left: '60%' },
  'living-room_0_2': { icon: 'warning',    top: '30%', left: '20%' },
  'living-room_0_3': { icon: 'lightbulb',  top: '55%', left: '15%' },
  'living-room_1_0': { icon: 'lock',       top: '40%', left: '50%' },
  'living-room_1_1': { icon: 'lines',      top: '65%', left: '35%' },
  'living-room_2_0': { icon: 'lines',      top: '50%', left: '70%' },
  // Entrance
  'entrance_0_0': { icon: 'lock',    top: '35%', left: '30%' },
  'entrance_0_1': { icon: 'warning', top: '50%', left: '50%' },
  'entrance_1_0': { icon: 'warning', top: '60%', left: '40%' },
  'entrance_1_1': { icon: 'lines',   top: '25%', left: '65%' },
  // Patio
  'patio_0_0': { icon: 'warning', top: '30%', left: '25%' },
  'patio_1_0': { icon: 'lines',   top: '50%', left: '55%' },
  'patio_2_0': { icon: 'warning', top: '65%', left: '40%' },
  // Dining / Laundry / Pantry
  'dining_0_0': { icon: 'lines',   top: '30%', left: '35%' },
  'dining_0_1': { icon: 'warning', top: '50%', left: '55%' },
  'dining_0_2': { icon: 'warning', top: '40%', left: '70%' },
  'dining_1_0': { icon: 'lock',    top: '65%', left: '30%' },
  // Bathroom
  'bathroom_0_0': { icon: 'warning',    top: '25%', left: '30%' },
  'bathroom_0_1': { icon: 'water',      top: '55%', left: '45%' },
  'bathroom_0_2': { icon: 'lightbulb',  top: '20%', left: '65%' },
  'bathroom_0_3': { icon: 'lock',       top: '60%', left: '20%' },
  'bathroom_1_0': { icon: 'pill',       top: '35%', left: '60%' },
  'bathroom_1_1': { icon: 'lines',      top: '70%', left: '55%' },
  // Eli's Bedroom
  'elis-bedroom_0_0': { icon: 'warning', top: '20%', left: '50%' },
  'elis-bedroom_1_0': { icon: 'person',  top: '45%', left: '30%' },
  'elis-bedroom_1_1': { icon: 'warning', top: '65%', left: '60%' },
  // Bedroom 2
  'bedroom2_0_0': { icon: 'lines',   top: '40%', left: '40%' },
  'bedroom2_1_0': { icon: 'warning', top: '60%', left: '60%' },
  // Stairs
  'stairs_0_0': { icon: 'person', top: '40%', left: '45%' },
  'stairs_1_0': { icon: 'person', top: '65%', left: '35%' }
};

// ─── STATE ───────────────────────────────────────────────────────────────────

let currentFloor = 1;
let currentRoom = null;
let carouselIndex = 0;
let carouselPhotos = [];
let carouselImagesLoaded = {};

// ─── ELEMENTS ────────────────────────────────────────────────────────────────

const overview     = document.getElementById('overview');
const roomview     = document.getElementById('roomview');
const floortoggle  = document.getElementById('floortoggle');
const floormap     = document.getElementById('floormap');
const floormapImg  = document.getElementById('floormap-img');
const floorHint    = document.getElementById('floor-hint-text');
const floorTabs    = document.querySelectorAll('.floor-tab');

const backBtn          = document.getElementById('back-btn');
const roomNameLabel    = document.getElementById('room-name-label');
const roomFloorTag     = document.getElementById('room-floor-tag');
const panelRoomName    = document.getElementById('panel-room-name');
const panelRiskMeta    = document.getElementById('panel-risk-meta');
const panelHazards     = document.getElementById('panel-hazards');

const carousel          = document.getElementById('carousel');
const carouselPlaceholder = document.getElementById('carousel-placeholder');
const carouselLabel     = document.getElementById('carousel-label');
const carouselCounter   = document.getElementById('carousel-counter');
const carouselDotsEl    = document.getElementById('carousel-dots');
const arrowPrev         = document.getElementById('arrow-prev');
const arrowNext         = document.getElementById('arrow-next');

// ─── FLOOR RENDERING ─────────────────────────────────────────────────────────

function renderFloor(floor) {
  currentFloor = floor;
  const data = FLOORS[floor];

  floormapImg.src = data.image;
  floormapImg.alt = `Floor ${floor} birdseye view`;
  floorHint.textContent = data.hint;

  // Remove existing zones
  floormap.querySelectorAll('.room-zone').forEach(z => z.remove());

  // Create zones
  data.zones.forEach(zone => {
    const el = document.createElement('div');
    el.className = 'room-zone';
    el.dataset.roomId = zone.id;
    Object.assign(el.style, zone.style);
    el.style.zIndex = zone.zIndex || 1;

    const label = document.createElement('div');
    label.className = 'zone-label';
    label.textContent = zone.name;
    if (zone.id === 'living-room') {
      label.style.cssText = 'bottom:auto;left:50%;top:50%;transform:translate(-50%,-50%);';
    }
    el.appendChild(label);

    el.addEventListener('click', () => openRoom(zone.id));
    floormap.appendChild(el);
  });

  // Update tab active state
  floorTabs.forEach(t => {
    t.classList.toggle('active', parseInt(t.dataset.floor) === floor);
  });
}

// ─── ROOM OPEN / CLOSE ───────────────────────────────────────────────────────

function openRoom(roomId) {
  const zoneData = FLOORS[currentFloor].zones.find(z => z.id === roomId);
  if (!zoneData) return;

  const roomInfo = ROOM_DATA[roomId];
  if (!roomInfo) return;

  currentRoom = roomId;
  carouselPhotos = zoneData.photos || [];
  carouselImagesLoaded = {};

  // Update room topbar
  roomNameLabel.textContent = roomInfo.name;
  roomFloorTag.textContent = `Floor ${roomInfo.floor}`;

  // Update panel header
  panelRoomName.textContent = roomInfo.name;
  panelRiskMeta.textContent = `${roomInfo.riskLevel} · ${roomInfo.hazardCount} hazard${roomInfo.hazardCount !== 1 ? 's' : ''}`;

  // Render hazard accordion cards
  renderHazards(roomId, roomInfo);

  // Render hazard icons (will become visible once photo loads)
  renderHazardIcons(roomId, roomInfo);

  // Setup carousel
  setupCarousel(roomId, carouselPhotos);

  // Switch state
  overview.classList.add('hidden');
  floortoggle.style.display = 'none';
  roomview.classList.add('active');
}

function closeRoom() {
  roomview.classList.remove('active');
  floortoggle.style.display = '';
  overview.classList.remove('hidden');
  currentRoom = null;
  carouselImg.classList.remove('visible');
  carouselImg.src = '';
  carouselImagesLoaded = {};
  const iconLayer = document.getElementById('photo-icon-layer');
  if (iconLayer) iconLayer.innerHTML = '';
}

// ─── HAZARD PANEL ────────────────────────────────────────────────────────────

const LINK_ICON = `<svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 2H2a1 1 0 00-1 1v5a1 1 0 001 1h5a1 1 0 001-1V6"/><path d="M6.5 1h2.5v2.5M5 5L9 1"/></svg>`;

function renderHazards(roomId, roomInfo) {
  panelHazards.innerHTML = '';

  if (!roomInfo.categories || roomInfo.categories.length === 0) {
    const msg = document.createElement('div');
    msg.style.cssText = 'font-size:11px;color:#8090a4;padding:16px 0;text-align:center;';
    msg.textContent = 'Hazard data will be added in the next pass.';
    panelHazards.appendChild(msg);
    return;
  }

  roomInfo.categories.forEach((cat, catIdx) => {
    const color = CAT_COLORS[cat.name] || '#888';

    cat.hazards.forEach((hazard, hazardIdx) => {
      const hazardId = `${roomId}_${catIdx}_${hazardIdx}`;

      const card = document.createElement('div');
      card.className = 'accordion-card';
      card.dataset.hazardId = hazardId;
      card.dataset.cat = cat.name.toLowerCase();

      const priceHTML = hazard.price
        ? `<div class="accordion-price">${hazard.price}</div>` : '';
      const linksHTML = (hazard.links && hazard.links.length)
        ? `<div class="accordion-links">${hazard.links.map(l =>
            `<a href="${l.url}" target="_blank" rel="noopener" class="accordion-link">${l.text}${LINK_ICON}</a>`
          ).join('')}</div>` : '';

      card.innerHTML = `
        <div class="accordion-header">
          <div class="accordion-dot" style="background:${color}"></div>
          <div class="accordion-title">${hazard.title}</div>
          <svg class="accordion-chevron" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="2,4 7,9 12,4"/></svg>
        </div>
        <div class="accordion-body">
          <div class="accordion-desc">${hazard.desc}</div>
          <div class="accordion-solution">${hazard.solution}</div>
          ${priceHTML}${linksHTML}
        </div>
      `;

      card.querySelector('.accordion-header').addEventListener('click', () => {
        toggleAccordionCard(hazardId);
      });

      panelHazards.appendChild(card);
    });
  });
}

function renderHazardIcons(roomId, roomInfo) {
  const layer = document.getElementById('photo-icon-layer');
  layer.innerHTML = '';

  roomInfo.categories.forEach((cat, catIdx) => {
    const color = CAT_COLORS[cat.name] || '#888';
    cat.hazards.forEach((hazard, hazardIdx) => {
      const key = `${roomId}_${catIdx}_${hazardIdx}`;
      const meta = HAZARD_META[key];
      if (!meta) return;

      const btn = document.createElement('button');
      btn.className = 'hazard-icon';
      btn.dataset.hazardId = key;
      btn.style.background = color;
      btn.style.top = meta.top;
      btn.style.left = meta.left;
      btn.innerHTML = ICON_SVGS[meta.icon] || ICON_SVGS.warning;
      btn.title = hazard.title;
      btn.addEventListener('click', () => focusHazardCard(key));
      layer.appendChild(btn);
    });
  });
}

function setActiveIcon(hazardId) {
  const layer = document.getElementById('photo-icon-layer');
  if (!layer) return;
  layer.querySelectorAll('.hazard-icon').forEach(icon => {
    icon.classList.toggle('active', hazardId != null && icon.dataset.hazardId === hazardId);
  });
}

function toggleAccordionCard(hazardId, forceOpen) {
  const card = panelHazards.querySelector(`[data-hazard-id="${hazardId}"]`);
  if (!card) return;

  const isOpen = card.classList.contains('open');

  // Close all open cards
  panelHazards.querySelectorAll('.accordion-card.open').forEach(c => {
    if (c !== card) c.classList.remove('open');
  });

  if (forceOpen === true || (forceOpen === undefined && !isOpen)) {
    card.classList.add('open');
    setActiveIcon(hazardId);
  } else if (forceOpen !== true) {
    card.classList.remove('open');
    setActiveIcon(null);
  }
}

function focusHazardCard(hazardId) {
  // Ensure card is open
  toggleAccordionCard(hazardId, true);

  const card = panelHazards.querySelector(`[data-hazard-id="${hazardId}"]`);
  if (!card) return;

  // Remove any existing focus highlight
  panelHazards.querySelectorAll('.accordion-card.focused').forEach(c => c.classList.remove('focused'));

  // Apply focus highlight
  card.classList.add('focused');

  // Scroll into view
  card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

  // Auto-remove highlight after 2s
  setTimeout(() => card.classList.remove('focused'), 2000);
}

// ─── CAROUSEL ────────────────────────────────────────────────────────────────

const carouselImg  = document.getElementById('carousel-img');

function setupCarousel(roomId, photos) {
  carouselIndex = 0;
  carouselImagesLoaded = {};

  // Show/hide arrows based on photo count
  const singlePhoto = photos.length <= 1;
  arrowPrev.classList.toggle('hidden', singlePhoto);
  arrowNext.classList.toggle('hidden', singlePhoto);

  // Build dots
  carouselDotsEl.innerHTML = '';
  photos.forEach((_, i) => {
    const dot = document.createElement('div');
    dot.className = 'carousel-dot' + (i === 0 ? ' active' : '');
    dot.addEventListener('click', () => goToSlide(i));
    carouselDotsEl.appendChild(dot);
  });

  updateCarouselDisplay();
}

function updateCarouselDisplay() {
  const total = carouselPhotos.length;
  const src   = carouselPhotos[carouselIndex];

  const roomInfo = ROOM_DATA[currentRoom];
  const roomName = roomInfo ? roomInfo.name : '';
  const labelText = roomName ? `${roomName} — Photo ${carouselIndex + 1} of ${total}` : `Photo ${carouselIndex + 1} of ${total}`;
  carouselLabel.textContent   = labelText;
  carouselCounter.textContent = `${carouselIndex + 1} / ${total}`;

  if (carouselImagesLoaded[carouselIndex] === true) {
    carouselPlaceholder.style.display = 'none';
    carouselImg.classList.add('visible');
    carouselImg.src = src;
  } else if (carouselImagesLoaded[carouselIndex] === false) {
    carouselImg.classList.remove('visible');
    carouselPlaceholder.style.display = 'flex';
  } else {
    carouselImg.classList.remove('visible');
    carouselPlaceholder.style.display = 'flex';
    const probe = new Image();
    probe.onload = () => {
      carouselImagesLoaded[carouselIndex] = true;
      if (carouselPhotos[carouselIndex] === src) updateCarouselDisplay();
    };
    probe.onerror = () => {
      carouselImagesLoaded[carouselIndex] = false;
      if (carouselPhotos[carouselIndex] === src) updateCarouselDisplay();
    };
    probe.src = src;
  }

  carouselDotsEl.querySelectorAll('.carousel-dot').forEach((dot, i) => {
    dot.classList.toggle('active', i === carouselIndex);
  });
}

function goToSlide(index) {
  const total = carouselPhotos.length;
  carouselIndex = (index + total) % total;
  updateCarouselDisplay();
}

arrowPrev.addEventListener('click', () => goToSlide(carouselIndex - 1));
arrowNext.addEventListener('click', () => goToSlide(carouselIndex + 1));

// ─── FLOOR TABS ──────────────────────────────────────────────────────────────

floorTabs.forEach(tab => {
  tab.addEventListener('click', () => {
    const floor = parseInt(tab.dataset.floor);
    if (floor === currentFloor && !currentRoom) return;
    closeRoom();
    renderFloor(floor);
  });
});

// ─── BACK BUTTON ─────────────────────────────────────────────────────────────

backBtn.addEventListener('click', closeRoom);

// ─── INIT ────────────────────────────────────────────────────────────────────

renderFloor(1);
</script>
